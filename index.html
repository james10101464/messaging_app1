<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realtime Messenger</title>
    <style>
      :root { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji"; }
      html, body { margin: 0; height: 100%; }
      body { display: flex; align-items: stretch; }
      .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr auto; width: 100%; height: 100vh; }
      header { grid-column: 1 / -1; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display:flex; gap:12px; align-items:center; }
      .sidebar { border-right: 1px solid #e5e7eb; padding: 12px; overflow-y: auto; }
      .main { display: grid; grid-template-rows: 1fr auto; }
      .messages { padding: 12px; overflow-y: auto; }
      .composer { padding: 8px; border-top: 1px solid #e5e7eb; display:flex; gap:8px; }
      input, button { padding: 8px 10px; font-size: 14px; }
      .bubble { max-width: 70%; margin: 6px 0; padding: 8px 10px; border-radius: 12px; background: #f3f4f6; }
      .bubble.me { background: #d1fae5; margin-left: auto; }
      .section { margin-bottom: 18px; }
      .list { display: flex; flex-direction: column; gap: 6px; }
      .pill { display:inline-block; padding:4px 8px; border-radius:999px; background:#f3f4f6; }
      .target { font-weight:600; }
      .typing { font-size: 12px; opacity: 0.7; }
      .login { display:flex; gap:8px; }
      .muted { color:#6b7280; font-size:12px; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div>Realtime Messenger</div>
        <div id="meInfo" class="muted"></div>
      </header>

      <aside class="sidebar">
        <div class="section">
          <div><strong>Login</strong></div>
          <div class="login">
            <input id="username" placeholder="Pick a username" />
            <button id="loginBtn">Login</button>
          </div>
          <div class="muted" style="margin-top:6px">Usernames must be unique while online.</div>
        </div>

        <div class="section">
          <div><strong>Direct Messages</strong></div>
          <div id="users" class="list"></div>
        </div>

        <div class="section">
          <div style="display:flex; align-items:center; gap:6px">
            <strong>Groups</strong>
            <input id="newGroupName" placeholder="New group name" style="flex:1" />
            <button id="createGroupBtn">Create</button>
          </div>
          <div id="groups" class="list" style="margin-top:8px"></div>
        </div>
      </aside>

      <main class="main">
        <div id="messages" class="messages"></div>
        <div class="composer">
          <div id="target" class="target pill">Select a DM or Group</div>
          <input id="text" placeholder="Type a message..." style="flex:1" disabled />
          <button id="sendBtn" disabled>Send</button>
        </div>
        <div id="typing" class="typing" style="padding:0 12px 8px 12px;"></div>
      </main>
    </div>

    <script src="./client.js"></script>
  </body>
</html>
